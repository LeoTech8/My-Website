<!DOCTYPE html>
<html lang="en-AU">
<head>
    <meta charset="UTF-8">
    <title>P2P Multiplayer Game</title>
    <style>
        body { 
            background: #222; 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
        }
        canvas { 
            background: #000; 
            border: 2px solid #444; 
            display: block; 
            margin: 10px auto; 
        }
        /* Menu box for connection settings */
        .menu { 
            background: #333; 
            padding: 15px; 
            border-radius: 8px; 
            display: inline-block; 
            margin-top: 10px; 
        }
        input { 
            padding: 8px; 
            border-radius: 4px; 
            border: none; 
            outline: none;
        }
        button { 
            padding: 8px 15px; 
            cursor: pointer; 
            background: #45ff01; 
            border: none; 
            border-radius: 4px; 
            font-weight: bold; 
            transition: background 0.2s;
        }
        button:hover {
            background: #32ba00;
        }
        #status { 
            color: #ffcc00; 
            margin: 5px; 
            font-weight: bold;
        }
        #myIdDisplay {
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: #45ff01;
            margin-bottom: 10px;
        }
    </style>
    
<!-- Socket.IO client -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<!-- Your game -->
<script src="src/multi.js" defer></script>
</head>
<body>

    <h1>Square Chaser Multiplayer</h1>

    <div class="menu">
        <div id="status">Status: Waiting for PeerJS...</div>
        <div id="myIdDisplay">My ID: ---</div>
        
        <input type="text" id="remoteIdInput" placeholder="Paste Friend's ID here">
        <button id="joinBtn">Join Lobby</button>
        <button id="startBtn">Start Game</button>
    </div>

    <!-- The Game Canvas -->
    <canvas id="gameCanvas" width="1350" height="650">
        Your browser is too old to play this game!
    </canvas>

</body>
</html>
