<!DOCTYPE html>
<html>
<head>
    <title>P2P Multiplayer Game</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; }
        canvas { background: #000; border: 2px solid #444; display: block; margin: 10px auto; }
        .menu { background: #333; padding: 15px; border-radius: 8px; display: inline-block; margin-top: 10px; }
        input { padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px 15px; cursor: pointer; background: #45ff01; border: none; border-radius: 4px; font-weight: bold; }
        #status { color: #ffcc00; margin: 5px; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="src/multi.js" defer></script>
</head>
<body>

    <div class="menu">
        <div id="status">Status: Waiting for PeerJS...</div>
        <div id="myIdDisplay">My ID: ---</div>
        <br>
        <input type="text" id="remoteIdInput" placeholder="Paste Friend's ID here">
        <button id="joinBtn">Join Lobby</button>
        <button id="startBtn">Start Game</button>
    </div>

    <canvas id="gameCanvas" width="1350" height="650"></canvas>
</body>
</html>
