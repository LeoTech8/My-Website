<!DOCTYPE html>
<html>
    <head>
        <title>Inspired Minds Project</title>
<style>
    body { 
        background: #222; 
        color: white; 
        font-family: sans-serif; 
        text-align: center; 
    }
    h1 {
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
        cursor: pointer;
    }
    canvas { 
        background: #000; 
        border: 2px solid #444; 
        display: block; 
        margin: 10px auto; 
    }
    /* This creates the dark grey box around your buttons */
    .menu { 
        background: #333; 
        padding: 15px; 
        border-radius: 8px; 
        display: inline-block; 
        margin-top: 10px; 
        margin-bottom: 10px;
    }
    /* Styling for all buttons to match the green theme */
    button { 
        padding: 8px 15px; 
        cursor: pointer; 
        background: #45ff01; 
        border: none; 
        border-radius: 4px; 
        font-weight: bold; 
        margin: 2px;
    }
    button:hover {
        background: #32ba00;
    }
    a { text-decoration: none; }
</style>

    </head>
    <body>
        <h1 onclick="easteregg()">Inspired Minds Game</h1>
        <div class="menu">
        <button onclick="toggleSlowMode()">Slow Motion</button>
        <button onclick="togglePause()">Pause</button>
        <button onclick="hardMode()">Hard / Easy</button>
        <button id="startBtn">Start Game</button>
        <a href="multiplayer.html"><button>Multiplayer</button></a>
        </div>

        <br>
        <br>
        <canvas id="gameCanvas" width="1350" height="650 ">
        Your browser does not support the HTML canvas element. (Gee it must be quite old)
        </canvas>
        <script src="src/script.js"></script>
</script>
    </body>
</html>
