<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Homepage Clone</title>
    <style>
        /* 1. Global Reset & Variables */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Roboto, Arial, sans-serif;
            background-color: #f9f9f9;
            color: #030303;
            overflow: hidden;
        }

        /* 2. Header / Navbar Layout */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background-color: #ffffff;
            padding: 0 16px;
            z-index: 100;
            border-bottom: 1px solid #e5e5e5;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-icon, .nav-right .icon-btn {
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: none;
            background: none;
        }

        .menu-icon:hover, .nav-right .icon-btn:hover {
            background-color: #e5e5e5;
        }

        .logo-placeholder {
            font-size: 18px;
            font-weight: bold;
            color: #ff0000;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Search Bar Grouping */
        .nav-center {
            display: flex;
            flex: 0 1 600px;
            align-items: center;
        }

        .search-bar {
            width: 100%;
            padding: 8px 16px;
            border: 1px solid #cccccc;
            border-radius: 40px 0 0 40px;
            font-size: 16px;
            outline: none;
            height: 40px;
        }

        .search-bar:focus {
            border-color: #065fd4;
        }

        .search-btn {
            padding: 0 24px;
            background-color: #f8f8f8;
            border: 1px solid #cccccc;
            border-left: none;
            border-radius: 0 40px 40px 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 40px;
            font-size: 16px;
        }

        .search-btn:hover {
            background-color: #f0f0f0;
        }

        .profile-icon {
            width: 32px;
            height: 32px;
            background-color: #5c2525;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            cursor: pointer;
            margin-left: 8px;
        }

        /* 3. Main Layout Wrapper */
        .main-container {
            display: flex;
            margin-top: 56px;
            height: calc(100vh - 56px);
        }

        /* Left Sidebar */
        .sidebar {
            width: 240px;
            background-color: #ffffff;
            padding-top: 12px;
            overflow-y: auto;
            flex-shrink: 0;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 24px;
            padding: 0 24px;
            height: 40px;
            text-decoration: none;
            color: #030303;
            font-size: 14px;
        }

        .sidebar-link:hover {
            background-color: #f2f2f2;
        }

        .sidebar-link .icon {
            font-size: 20px;
            width: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 4. Content Area & Video Grid */
        .content-container {
            flex-grow: 1;
            background-color: #f9f9f9;
            padding: 24px;
            overflow-y: auto;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 40px 16px;
        }

        /* 5. Video Cards */
        .video-card {
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 12px;
            overflow: hidden;
            background-color: #1a1a1a;
        }

        .thumbnail {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .video-time {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 3px 4px;
            font-size: 12px;
            font-weight: 500;
            border-radius: 4px;
        }

        .video-info {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }

        .channel-pfp {
            width: 36px;
            height: 36px;
            background-color: #0073e6;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .video-details {
            display: flex;
            flex-direction: column;
        }

        .video-title {
            font-size: 14px;
            font-weight: 500;
            line-height: 20px;
            color: #0f0f0f;
            margin-bottom: 4px;
        }

        .video-author, .video-stats {
            font-size: 12px;
            color: #606060;
        }
    </style>
</head>
<body>

    <!-- 1. Header & Navigation Bar -->
    <header class="header">

        // Makes the hamburger button collapse the left menu smoothly
        const menuToggle = document.getElementById('menuToggle');
