<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Crypt</title>

<style>
body{
    margin:0;
    background:#111827;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:700px;
    background:#1f2937;
    padding:30px;
    border-radius:24px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
    margin-top:0;
    font-size:32px;
}

textarea{
    width:100%;
    height:220px;
    background:#111827;
    color:white;
    border:none;
    border-radius:16px;
    padding:18px;
    resize:none;
    font-size:16px;
    box-sizing:border-box;
}

input{
    width:100%;
    margin-top:16px;
    background:#111827;
    color:white;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:16px;
    box-sizing:border-box;
}

.buttons{
    display:flex;
    gap:12px;
    margin-top:20px;
}

button{
    flex:1;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

.red{
    background:#ff1717;
    color:white;
}

.black{
    background:#374151;
    color:white;
}

.copy{
    background:#10b981;
    color:white;
}

button:hover{
    transform:translateY(-2px);
}

#status{
    margin-top:16px;
    opacity:0.8;
    font-size:14px;
}

.output {
    margin-top: 20px;
    padding: 16px;
    background: #0b1220;
    border-radius: 14px;

    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

    /* THIS FIXES THE “ABYSS” PROBLEM */
    white-space: pre-wrap;     /* allows wrapping */
    word-break: break-word;    /* breaks long base64 strings */
    overflow-wrap: anywhere;   /* extra safety */

    max-height: 200px;
    overflow-y: auto;          /* scroll instead of expanding */
}
</style>
</head>

<body>

<div class="card">

<h1>Gamble</h1>

<div class="buttons">
  <button class="red" type="button" onclick="red()">Red</button>
  <button class="black" type="button" onclick="black()">Black</button>
  <a href="other_stuff.html">
  <button class="copy" type="button">Back</button>
  </a>
</div>

<div class="output" id="output">!!DONT GAMBLE REAL MONEY!!</div>
<div class="output "id="money">100</div>

</div>

</body>
<script>
alert('Do not gamble real money or you will have no money')
let money = 100
function red() {
    if (Math.random() < 0.5) {
    document.getElementById("output").textContent = "Red (You Won!)";
    money = money + 100
    document.getElementById("money").textContent = money;
    }
    else {
    document.getElementById("output").textContent = "Black (You Lost...)";
    money = money - 100
    document.getElementById("money").textContent = money;
    }

}
function black() {
    if (Math.random() < 0.5) {
    document.getElementById("output").textContent = "Red (You Lost...)";
    money = money - 100
    document.getElementById("money").textContent = money;
    } 
    else {
    document.getElementById("output").textContent = "Black (You Won!)";
    money = money + 100
    document.getElementById("money").textContent = money;
    }

}</script>
</html>
