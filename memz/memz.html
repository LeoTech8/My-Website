/* Global Page Reset & Styles */
body {
  margin: 0;
  padding: 0;
  background-color: #262626;
}
/* Centered Main Header Title */
h1 {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 3rem;
  letter-spacing: -1px;
  color: #ffffff;
  text-align: center;
  margin-top: 40px;
  margin-bottom: 20px;
}
/* Grid Framework to automatically fill the entire screen width */
ul {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 15px;
  list-style: none;
  padding: 20px;
  margin: 0;
}
/* Styling for the thumbnail photos in the grid list */
ul img {
  width: 100%;
  height: auto;
  border-radius: 8px;
  object-fit: cover;
  cursor: pointer;
  transition: transform 0.3s ease;
}
/* Only applies the 5px glide animation strictly inside the list grid */
ul img:hover {
  transform: translateY(-5px);
}
/* Full-Screen Lightbox Backdrop Overlay */
.lightbox {
  display: none; /* Hidden by default; turned to 'flex' by JS */
  position: fixed;
  z-index: 1000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0); 
  justify-content: center;
  align-items: center;
  transition: background-color 0.4s ease;
}
/* Structural wrapper to cleanly stack the title caption over the image */
.lightbox-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  max-width: 85%;
  max-height: 85%;
}
/* The dynamically loaded filename header text on top of the lightbox */
.lightbox-caption {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 1.8rem;
  color: #ffffff;
  text-transform: uppercase;
  margin-bottom: 15px;
  text-align: center;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
  opacity: 0;
  transition: opacity 0.3s ease;
}
/* Default state when opened */
.lightbox-content {
  max-width: 100%;
  max-height: 80vh;
  border-radius: 4px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
  object-fit: contain;
  transform-origin: center center; 
  /* Handles smooth structural dimensions sliding */
  transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.4s ease;
}
/* Corner X Close Button Styling */
.close-btn {
  position: absolute;
  top: 20px;
  right: 35px;
  color: #ffffff;
  font-size: 40px;
  font-weight: bold;
  cursor: pointer;
  opacity: 0;
  transition: color 0.2s ease, opacity 0.3s ease;
  z-index: 1001;
}
.close-btn:hover {
  color: #ff3333;
}
/* Styling for the credit text paragraph */
.credits-text {
  font-family: 'Montserrat', sans-serif;
  font-weight: 500;
  font-size: 1.1rem;
  color: #b3b3b3;
  text-align: center;
  margin-top: -10px;
  margin-bottom: 30px;
}
/* Flexbox wrapper to align buttons cleanly side-by-side */
.button-container {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-bottom: 20px;
}
/* Base button template styles */
.btn {
  font-family: 'Montserrat', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
  border: none;
  transition: all 0.2s ease;
}
/* Primary Accent Button (Make Thumbnail) */
.btn-primary {
  background-color: #00f0ff;
  color: #1a1a1a;
  box-shadow: 0 4px 15px rgba(0, 240, 255, 0.2);
}
.btn-primary:hover {
  background-color: #00d8e6;
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0, 240, 255, 0.4);
}
/* Secondary Neutral Button (Back) */
.btn-secondary {
  background-color: rgba(255, 255, 255, 0.1);
  color: #ffffff;
  border: 1px solid rgba(255, 255, 255, 0.2);
}
.btn-secondary:hover {
  background-color: rgba(255, 255, 255, 0.2);
  transform: translateY(-2px);
}
/* Click activation effect for both buttons */
.btn:active {
  transform: translateY(0);
}

/* Fluid Morph Overlay Activation Classes */
.lightbox.active {
  display: flex;
  background-color: rgba(0, 0, 0, 0.85);
}
.lightbox.active .lightbox-caption,
.lightbox.active .close-btn {
  opacity: 1;
}
</style>

<!-- The single lightbox container -->
<div id="imageLightbox" class="lightbox">
  <span class="close-btn">&times;</span>
  <div class="lightbox-wrapper">
    <div id="lightboxCaption" class="lightbox-caption"></div>
    <img class="lightbox-content" id="lightboxImg" alt="Enlarged view">
  </div>
</div>

<!-- JavaScript Functionality -->
<script>
const lightbox = document.getElementById('imageLightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxCaption = document.getElementById('lightboxCaption');
const closeBtn = document.querySelector('.close-btn');
let activeOriginImg = null; 

// Open Lightbox with physics geometric morphing
document.querySelectorAll('ul img').forEach(image => {
  image.addEventListener('click', () => {
    activeOriginImg = image;
    
    lightboxImg.src = image.src;
    lightboxCaption.textContent = image.alt;
    
    // 1. Mount layout in background invisibly to map screen coordinates
    lightbox.style.display = 'flex';
    lightbox.style.opacity = '0';
    
    const startRect = image.getBoundingClientRect();
    const endRect = lightboxImg.getBoundingClientRect();
    
    // 2. Measure exact geometric differential bounds
    const scaleX = startRect.width / endRect.width;
    const scaleY = startRect.height / endRect.height;
    const translateX = (startRect.left + startRect.width / 2) - (endRect.left + endRect.width / 2);
    const translateY = (startRect.top + startRect.height / 2) - (endRect.top + endRect.height / 2);
    
    // 3. Compress layout down to match thumbnail coordinates instantly
    lightboxImg.style.transition = 'none';
    lightboxImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scaleX}, ${scaleY})`;
    lightboxImg.style.opacity = '0.3';
    
    // 4. Force repaint frame pipeline to fire expansion animations smoothly
    requestAnimationFrame(() => {
      lightbox.style.opacity = '';
      lightbox.classList.add('active');
      
      requestAnimationFrame(() => {
        lightboxImg.style.transition = '';
        lightboxImg.style.transform = 'translate(0, 0) scale(1)';
        lightboxImg.style.opacity = '1';
      });
    });
  });
});

// Close Lightbox by reversing layout properties back into grid cell
function closeLightbox() {
  if (!activeOriginImg) {
    lightbox.classList.remove('active');
    return;
  }
  
  const startRect = activeOriginImg.getBoundingClientRect();
  const endRect = lightboxImg.getBoundingClientRect();
  
  const scaleX = startRect.width / endRect.width;
  const scaleY = startRect.height / endRect.height;
  const translateX = (startRect.left + startRect.width / 2) - (endRect.left + endRect.width / 2);
  const translateY = (startRect.top + startRect.height / 2) - (endRect.top + endRect.height / 2);
  
  lightboxImg.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scaleX}, ${scaleY})`;
  lightboxImg.style.opacity = '0';
  lightbox.classList.remove('active');
  
  setTimeout(() => {
    lightbox.style.display = 'none';
    lightboxImg.style.transform = '';
    activeOriginImg = null;
  }, 400);
}

// Global click listeners
closeBtn.addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e) => {
  if (e.target === lightbox) {
    closeLightbox();
  }
});
</script>
