<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault</title>

<style>
body{
    margin:0;
    background:#111827;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:700px;
    background:#1f2937;
    padding:30px;
    border-radius:24px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
    margin-top:0;
    font-size:32px;
}

textarea{
    width:100%;
    height:220px;
    background:#111827;
    color:white;
    border:none;
    border-radius:16px;
    padding:18px;
    resize:none;
    font-size:16px;
    box-sizing:border-box;
}

input{
    width:100%;
    margin-top:16px;
    background:#111827;
    color:white;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:16px;
    box-sizing:border-box;
}

.buttons{
    display:flex;
    gap:12px;
    margin-top:20px;
}

button{
    flex:1;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

.encrypt{
    background:#2563eb;
    color:white;
}

.decrypt{
    background:#374151;
    color:white;
}

.copy{
    background:#10b981;
    color:white;
}

button:hover{
    transform:translateY(-2px);
}

#status{
    margin-top:16px;
    opacity:0.8;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<h1>Vault</h1>

<textarea id="text"
placeholder="Enter text or encrypted message"></textarea>

<input
type="password"
id="password"
placeholder="Password">

<div class="buttons">
<button class="encrypt">Encrypt</button>
<button class="decrypt">Decrypt</button>
<button class="copy">Copy</button>
</div>

<div id="status">
Everything stays on this device.
</div>

</div>

</body>
</html>
