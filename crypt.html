<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vault</title>

<style>
body{
    margin:0;
    background:#111827;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:700px;
    background:#1f2937;
    padding:30px;
    border-radius:24px;
    box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

h1{
    margin-top:0;
    font-size:32px;
}

textarea{
    width:100%;
    height:220px;
    background:#111827;
    color:white;
    border:none;
    border-radius:16px;
    padding:18px;
    resize:none;
    font-size:16px;
    box-sizing:border-box;
}

input{
    width:100%;
    margin-top:16px;
    background:#111827;
    color:white;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:16px;
    box-sizing:border-box;
}

.buttons{
    display:flex;
    gap:12px;
    margin-top:20px;
}

button{
    flex:1;
    border:none;
    border-radius:14px;
    padding:14px;
    font-size:16px;
    cursor:pointer;
    transition:0.2s;
}

.encrypt{
    background:#2563eb;
    color:white;
}

.decrypt{
    background:#374151;
    color:white;
}

.copy{
    background:#10b981;
    color:white;
}

button:hover{
    transform:translateY(-2px);
}

#status{
    margin-top:16px;
    opacity:0.8;
    font-size:14px;
}

#output {
    margin-top: 20px;
    padding: 16px;
    background: #0b1220;
    border-radius: 14px;

    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;

    /* 🔥 THIS FIXES THE “ABYSS” PROBLEM */
    white-space: pre-wrap;     /* allows wrapping */
    word-break: break-word;    /* breaks long base64 strings */
    overflow-wrap: anywhere;   /* extra safety */

    max-height: 200px;
    overflow-y: auto;          /* scroll instead of expanding */
}
</style>
</head>

<body>

<div class="card">

<h1>Vault</h1>

<textarea id="text"
placeholder="Enter text or encrypted message"></textarea>

<input
type="password"
id="password"
placeholder="Password">

<div class="buttons">
  <button class="encrypt" type="button">Encrypt</button>
  <button class="decrypt" type="button">Decrypt</button>
  <button class="copy" type="button">Copy</button>
</div>

<div id="output"></div>

<div id="status">
Everything stays on this device.
</div>

</div>

</body>
<script>
function toBase64(buffer) {
    return btoa(String.fromCharCode(...new Uint8Array(buffer)));
}

function fromBase64(str) {
    return Uint8Array.from(atob(str), c => c.charCodeAt(0));
}

async function deriveKey(password, salt) {
    const enc = new TextEncoder();

    const keyMaterial = await crypto.subtle.importKey(
        "raw",
        enc.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
    );

    return crypto.subtle.deriveKey(
        {
            name: "PBKDF2",
            salt,
            iterations: 250000,
            hash: "SHA-256"
        },
        keyMaterial,
        {
            name: "AES-GCM",
            length: 256
        },
        false,
        ["encrypt", "decrypt"]
    );
}

async function encrypt() {
    const text = document.getElementById("text").value;
    const password = document.getElementById("password").value;

    if (!text || !password) {
        document.getElementById("status").textContent = "Enter text + password";
        return;
    }

    const enc = new TextEncoder();

    const salt = crypto.getRandomValues(new Uint8Array(16));
    const iv = crypto.getRandomValues(new Uint8Array(12));

    const key = await deriveKey(password, salt);

    const encrypted = await crypto.subtle.encrypt(
        { name: "AES-GCM", iv },
        key,
        enc.encode(text)
    );

    const combined = new Uint8Array([
        ...salt,
        ...iv,
        ...new Uint8Array(encrypted)
    ]);

    const result = toBase64(combined);

    document.getElementById("output").textContent = result;
    document.getElementById("status").textContent = "Encrypted";
}

async function decrypt() {
    try {
        const input = document.getElementById("text").value;
        const password = document.getElementById("password").value;

        if (!input || !password) {
            document.getElementById("status").textContent = "Enter encrypted text + password";
            return;
        }

        const data = fromBase64(input);

        const salt = data.slice(0, 16);
        const iv = data.slice(16, 28);
        const encrypted = data.slice(28);

        const key = await deriveKey(password, salt);

        const decrypted = await crypto.subtle.decrypt(
            { name: "AES-GCM", iv },
            key,
            encrypted
        );

        document.getElementById("output").textContent =
            new TextDecoder().decode(decrypted);

        document.getElementById("status").textContent = "Decrypted";
    } catch (e) {
        document.getElementById("status").textContent = "Wrong password or corrupted data";
    }
}

async function copyOutput() {
    const text = document.getElementById("output").textContent;

    try {
        await navigator.clipboard.writeText(text);
        document.getElementById("status").textContent = "Copied";
    } catch (e) {
        document.getElementById("status").textContent = "Copy failed (iOS restriction)";
    }
}

window.addEventListener("DOMContentLoaded", () => {
    document.querySelector(".encrypt").addEventListener("click", encrypt);
    document.querySelector(".decrypt").addEventListener("click", decrypt);
    document.querySelector(".copy").addEventListener("click", copyOutput);
});
</script>
</html>
